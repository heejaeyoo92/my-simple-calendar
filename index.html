<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>주간 캘린더 (15분 단위)</title>
  <style>
    :root{
      --bg:#0b0c10;
      --panel:#11131a;
      --grid:#222634;
      --text:#e9e9f0;
      --muted:#a6a8b5;
      --accent:#6aa9ff;
      --slot-h: 18px; /* 15분 높이(가변) */
      --timecol-w: 64px;
      --daycol-min: 140px;
      --header-h: 42px;
      --radius: 14px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:18px;
      background:linear-gradient(180deg, #0b0c10 0%, #0b0c10 60%, #0a0b0e 100%);
      color:var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Noto Sans KR, "Apple SD Gothic Neo", sans-serif;
    }
    .wrap{max-width:1200px;margin:0 auto}
    .topbar{
      display:flex; gap:10px; align-items:center; justify-content:space-between;
      margin-bottom:12px;
    }
    .title{
      display:flex; flex-direction:column; gap:2px;
    }
    .title h1{font-size:18px;margin:0}
    .title .sub{font-size:12px;color:var(--muted)}
    .controls{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    button, select, input[type="date"]{
      background:var(--panel);
      color:var(--text);
      border:1px solid #2a2f41;
      border-radius:10px;
      padding:8px 10px;
      outline:none;
    }
    button{cursor:pointer}
    button:hover{border-color:#3a4160}
    .calendar{
      border:1px solid #2a2f41;
      border-radius: var(--radius);
      overflow:hidden;
      background: rgba(17,19,26,.75);
      backdrop-filter: blur(6px);
    }
    .grid{
      display:grid;
      grid-template-columns: var(--timecol-w) repeat(7, minmax(var(--daycol-min), 1fr));
      grid-template-rows: var(--header-h) 1fr;
    }
    .corner{
      grid-column:1; grid-row:1;
      border-right:1px solid var(--grid);
      border-bottom:1px solid var(--grid);
      display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:12px;
    }
    .day-headers{
      grid-column:2 / span 7; grid-row:1;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .day-header{
      border-bottom:1px solid var(--grid);
      border-right:1px solid var(--grid);
      padding:8px 10px;
      display:flex; flex-direction:column; gap:2px;
    }
    .day-header:last-child{border-right:none}
    .dow{font-size:12px;color:var(--muted)}
    .date{font-size:13px;font-weight:600}
    .time-col{
      grid-column:1; grid-row:2;
      border-right:1px solid var(--grid);
      position:relative;
    }
    .time-col .tick{
      height: calc(var(--slot-h) * 4); /* 1시간 */
      border-bottom:1px solid rgba(255,255,255,0.06);
      padding:4px 6px;
      font-size:11px;
      color:var(--muted);
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
    }
    .days{
      grid-column:2 / span 7; grid-row:2;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      position:relative;
    }
    .day{
      position:relative;
      border-right:1px solid var(--grid);
      background:
        linear-gradient(to bottom,
          rgba(255,255,255,0.06) 1px,
          transparent 1px
        );
      background-size: 100% var(--slot-h); /* 15분 단위 줄 */
      height: calc(var(--slot-h) * 96); /* 24h * 4(15분) = 96 */
      cursor:crosshair;
    }
    .day:last-child{border-right:none}
    .event{
      position:absolute;
      left:6px; right:6px;
      border-radius:12px;
      padding:8px 10px;
      font-size:12px;
      line-height:1.2;
      color:#0b0c10;
      box-shadow: 0 6px 18px rgba(0,0,0,.25);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.15);
    }
    .event .name{font-weight:700}
    .event .meta{margin-top:4px; font-size:11px; opacity:.85}
    .event .tag{
      display:inline-block;
      margin-top:6px;
      padding:2px 8px;
      border-radius:999px;
      background: rgba(255,255,255,.35);
      font-size:11px;
    }
    .event .del{
      position:absolute;
      top:6px; right:8px;
      width:22px; height:22px;
      border:none;
      border-radius:999px;
      background: rgba(0,0,0,.18);
      color:#0b0c10;
      cursor:pointer;
      font-weight:800;
      line-height:22px;
      text-align:center;
    }
    .event .del:hover{background: rgba(0,0,0,.28)}
    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }

    /* Modal */
    .modal-backdrop{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:1000;
    }
    .modal{
      width:min(520px, 100%);
      background: #0f121a;
      border:1px solid #2a2f41;
      border-radius: 16px;
      overflow:hidden;
      box-shadow: 0 20px 70px rgba(0,0,0,.55);
    }
    .modal header{
      padding:14px 16px;
      border-bottom:1px solid #2a2f41;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .modal header .h{
      display:flex; flex-direction:column; gap:2px;
    }
    .modal header .h .t{font-size:14px;font-weight:700}
    .modal header .h .d{font-size:12px;color:var(--muted)}
    .modal header .x{
      border:none;
      background:transparent;
      color:var(--muted);
      font-size:22px;
      cursor:pointer;
      padding:2px 8px;
    }
    .modal main{
      padding:14px 16px;
      display:grid;
      gap:10px;
    }
    .row{
      display:grid;
      grid-template-columns: 110px 1fr;
      gap:10px;
      align-items:center;
    }
    label{color:var(--muted); font-size:12px}
    .field, textarea{
      width:100%;
      background: #0b0c10;
      border:1px solid #2a2f41;
      border-radius:10px;
      padding:10px;
      color:var(--text);
      outline:none;
    }
    textarea{min-height:80px; resize:vertical}
    .two{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .inline{
      display:flex; gap:10px; align-items:center;
    }
    input[type="color"]{
      width:44px; height:38px; padding:0; border:none; background:transparent;
      cursor:pointer;
    }
    .modal footer{
      padding:12px 16px;
      border-top:1px solid #2a2f41;
      display:flex;
      gap:10px;
      justify-content:flex-end;
    }
    .btn-primary{
      border:1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(106,169,255,.25), rgba(106,169,255,.12));
    }
    .btn-danger{
      border:1px solid rgba(255,130,130,.25);
      background: rgba(255,130,130,.12);
    }
    .error{
      color:#ff8e8e;
      font-size:12px;
      display:none;
      margin-top:-6px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">
      <h1>주간 캘린더 (15분 단위)</h1>
      <div class="sub">빈 영역 클릭 → 일정 입력 → 확인 → 해당 시간에 색상 블록 표시</div>
    </div>
    <div class="controls">
      <button id="prevWeek">◀ 이전 주</button>
      <button id="today">오늘</button>
      <button id="nextWeek">다음 주 ▶</button>
      <input id="weekBase" type="date" />
      <select id="startOfWeek">
        <option value="1" selected>주 시작: 월요일</option>
        <option value="0">주 시작: 일요일</option>
      </select>
      <button id="clearAll" class="btn-danger">전체 삭제</button>
    </div>
  </div>

  <div class="calendar">
    <div class="grid">
      <div class="corner">TIME</div>
      <div class="day-headers" id="dayHeaders"></div>
      <div class="time-col" id="timeCol"></div>
      <div class="days" id="days"></div>
    </div>
  </div>

  <div class="hint">
    • 블록은 드래그 생성이 아닌 “클릭 기반” 샘플입니다. (원하면 드래그/리사이즈도 추가 가능) <br/>
    • 일정은 localStorage에 저장되어 새로고침해도 유지됩니다.
  </div>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <header>
      <div class="h">
        <div class="t">일정 추가</div>
        <div class="d" id="modalDateHint">-</div>
      </div>
      <button class="x" id="modalClose" aria-label="닫기">×</button>
    </header>
    <main>
      <div class="row">
        <label for="evName">일정 이름</label>
        <input class="field" id="evName" placeholder="예: 캐릭터 챗 기획 리뷰" />
      </div>

      <div class="row">
        <label>시작 / 종료</label>
        <div class="two">
          <input class="field" id="evStart" type="time" step="900" />
          <input class="field" id="evEnd" type="time" step="900" />
        </div>
      </div>

      <div class="error" id="timeError">종료 시간이 시작 시간보다 뒤여야 합니다.</div>

      <div class="row">
        <label>성격(태그) / 색상</label>
        <div class="inline">
          <select class="field" id="evCategory" style="max-width: 240px;">
            <option value="PO Silo">PO Silo</option>
            <option value="캐릭터 챗">캐릭터 챗</option>
            <option value="회의">회의</option>
            <option value="개발">개발</option>
            <option value="기타" selected>기타</option>
          </select>
          <input id="evColor" type="color" value="#FFD24D" title="색상" />
        </div>
      </div>

      <div class="row">
        <label for="evNote">기타(메모)</label>
        <textarea id="evNote" class="field" placeholder="필요한 메모를 적어주세요."></textarea>
      </div>
    </main>
    <footer>
      <button id="modalCancel">취소</button>
      <button id="modalSave" class="btn-primary">확인</button>
    </footer>
  </div>
</div>

<script>
(() => {
  // ---------- Utils ----------
  const pad2 = n => String(n).padStart(2,'0');

  const toDateKey = (d) => {
    // YYYY-MM-DD
    const y = d.getFullYear();
    const m = pad2(d.getMonth()+1);
    const day = pad2(d.getDate());
    return `${y}-${m}-${day}`;
  };

  const parseTimeToMin = (t) => {
    // "HH:MM" => minutes
    const [h,m] = t.split(':').map(Number);
    return h*60 + m;
  };

  const minToTime = (min) => {
    const h = Math.floor(min/60);
    const m = min%60;
    return `${pad2(h)}:${pad2(m)}`;
  };

  const clampTo15 = (min) => Math.round(min/15)*15;

  const startOfWeekDate = (baseDate, startDow /*0 Sun,1 Mon*/) => {
    const d = new Date(baseDate);
    d.setHours(0,0,0,0);
    const dow = d.getDay();
    const diff = (dow - startDow + 7) % 7;
    d.setDate(d.getDate() - diff);
    return d;
  };

  const fmtKorean = (d) => {
    const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
    return `${y}년 ${m}월 ${day}일`;
  };

  const dowKor = ["일","월","화","수","목","금","토"];

  // ---------- State ----------
  const STORAGE_KEY = "weekly_calendar_events_v1";
  /** events: Array<{id, dateKey, startMin, endMin, name, category, color, note}> */
  let events = loadEvents();

  let startDow = 1; // Monday default
  let base = new Date();
  base.setHours(0,0,0,0);

  // ---------- DOM ----------
  const elDayHeaders = document.getElementById("dayHeaders");
  const elTimeCol = document.getElementById("timeCol");
  const elDays = document.getElementById("days");

  const weekBase = document.getElementById("weekBase");
  const startOfWeekSel = document.getElementById("startOfWeek");

  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalClose = document.getElementById("modalClose");
  const modalCancel = document.getElementById("modalCancel");
  const modalSave = document.getElementById("modalSave");
  const modalDateHint = document.getElementById("modalDateHint");

  const evName = document.getElementById("evName");
  const evStart = document.getElementById("evStart");
  const evEnd = document.getElementById("evEnd");
  const evCategory = document.getElementById("evCategory");
  const evColor = document.getElementById("evColor");
  const evNote = document.getElementById("evNote");
  const timeError = document.getElementById("timeError");

  const btnPrev = document.getElementById("prevWeek");
  const btnNext = document.getElementById("nextWeek");
  const btnToday = document.getElementById("today");
  const btnClearAll = document.getElementById("clearAll");

  // 현재 모달 생성 컨텍스트
  let pendingDateKey = null;

  // ---------- Build static time column ----------
  function buildTimeCol(){
    elTimeCol.innerHTML = "";
    for(let h=0; h<24; h++){
      const tick = document.createElement("div");
      tick.className = "tick";
      tick.textContent = `${pad2(h)}:00`;
      elTimeCol.appendChild(tick);
    }
  }

  // ---------- Build week view ----------
  function render(){
    // sync inputs
    weekBase.value = toDateKey(base);
    startOfWeekSel.value = String(startDow);

    const sow = startOfWeekDate(base, startDow);

    // headers
    elDayHeaders.innerHTML = "";
    const dates = [];
    for(let i=0;i<7;i++){
      const d = new Date(sow);
      d.setDate(sow.getDate()+i);
      dates.push(d);

      const hd = document.createElement("div");
      hd.className = "day-header";

      const dow = document.createElement("div");
      dow.className = "dow";
      dow.textContent = `${dowKor[d.getDay()]}요일`;

      const date = document.createElement("div");
      date.className = "date";
      date.textContent = `${d.getMonth()+1}/${d.getDate()}`;

      hd.appendChild(dow);
      hd.appendChild(date);
      elDayHeaders.appendChild(hd);
    }

    // days columns
    elDays.innerHTML = "";
    for(let i=0;i<7;i++){
      const dayCol = document.createElement("div");
      dayCol.className = "day";
      dayCol.dataset.dateKey = toDateKey(dates[i]);
      dayCol.addEventListener("click", onDayClick);
      elDays.appendChild(dayCol);
    }

    // events
    for(const ev of events){
      const dayCol = elDays.querySelector(`.day[data-date-key="${ev.dateKey}"]`);
      if(!dayCol) continue;
      const block = makeEventBlock(ev);
      dayCol.appendChild(block);
    }
  }

  function makeEventBlock(ev){
    const block = document.createElement("div");
    block.className = "event";
    block.style.background = ev.color;

    // top position by minutes
    const slotH = getComputedStyle(document.documentElement).getPropertyValue('--slot-h').trim();
    const slotHeightPx = parseFloat(slotH); // px
    const topPx = (ev.startMin / 15) * slotHeightPx;
    const hPx = Math.max(1, ((ev.endMin - ev.startMin) / 15) * slotHeightPx);

    block.style.top = `${topPx}px`;
    block.style.height = `${hPx}px`;

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = ev.name || "(제목 없음)";

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `${minToTime(ev.startMin)}–${minToTime(ev.endMin)}`;

    const tag = document.createElement("div");
    tag.className = "tag";
    tag.textContent = ev.category || "기타";

    const del = document.createElement("button");
    del.className = "del";
    del.title = "삭제";
    del.textContent = "×";
    del.addEventListener("click", (e) => {
      e.stopPropagation();
      if(confirm("이 일정을 삭제할까요?")){
        events = events.filter(x => x.id !== ev.id);
        saveEvents();
        render();
      }
    });

    block.appendChild(del);
    block.appendChild(name);
    block.appendChild(meta);
    block.appendChild(tag);

    // hover tooltip via title
    const note = (ev.note || "").trim();
    if(note){
      block.title = note;
    }
    return block;
  }

  // ---------- Click -> open modal ----------
  function onDayClick(e){
    const dayCol = e.currentTarget;
    const dateKey = dayCol.dataset.dateKey;

    // 클릭 y좌표를 15분 단위로 변환
    const rect = dayCol.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const slotH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--slot-h'));
    const idx = Math.floor(y / slotH); // 0..95
    const startMin = clampTo15(idx * 15);
    const endMin = Math.min(24*60, startMin + 60); // 기본 1시간

    pendingDateKey = dateKey;
    openModal(dateKey, startMin, endMin);
  }

  function openModal(dateKey, startMin, endMin){
    timeError.style.display = "none";
    evName.value = "";
    evStart.value = minToTime(startMin);
    evEnd.value = minToTime(endMin);
    evCategory.value = "기타";
    evColor.value = "#FFD24D";
    evNote.value = "";

    // date hint
    const d = new Date(dateKey + "T00:00:00");
    modalDateHint.textContent = `${fmtKorean(d)} (${dowKor[d.getDay()]}요일)`;

    modalBackdrop.style.display = "flex";
    setTimeout(() => evName.focus(), 0);
  }

  function closeModal(){
    modalBackdrop.style.display = "none";
    pendingDateKey = null;
  }

  function validateTimes(){
    const s = parseTimeToMin(evStart.value);
    const t = parseTimeToMin(evEnd.value);
    if(!(t > s)){
      timeError.style.display = "block";
      return null;
    }
    timeError.style.display = "none";
    return {s,t};
  }

  function createEvent(){
    const tt = validateTimes();
    if(!tt) return;

    const id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2);

    const ev = {
      id,
      dateKey: pendingDateKey,
      startMin: clampTo15(tt.s),
      endMin: clampTo15(tt.t),
      name: evName.value.trim(),
      category: evCategory.value,
      color: evColor.value,
      note: evNote.value.trim()
    };

    // 같은 날짜에 완전히 동일 시간대 겹침 경고(간단)
    const overlaps = events.some(x =>
      x.dateKey === ev.dateKey &&
      !(ev.endMin <= x.startMin || ev.startMin >= x.endMin)
    );
    if(overlaps){
      if(!confirm("겹치는 일정이 있습니다. 그래도 추가할까요?")) return;
    }

    events.push(ev);
    saveEvents();
    closeModal();
    render();
  }

  // ---------- Storage ----------
  function loadEvents(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return [];
      const parsed = JSON.parse(raw);
      if(!Array.isArray(parsed)) return [];
      return parsed;
    }catch{
      return [];
    }
  }

  function saveEvents(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
  }

  // ---------- Controls ----------
  btnPrev.addEventListener("click", () => {
    base.setDate(base.getDate() - 7);
    render();
  });
  btnNext.addEventListener("click", () => {
    base.setDate(base.getDate() + 7);
    render();
  });
  btnToday.addEventListener("click", () => {
    base = new Date();
    base.setHours(0,0,0,0);
    render();
  });
  weekBase.addEventListener("change", () => {
    if(weekBase.value){
      base = new Date(weekBase.value + "T00:00:00");
      render();
    }
  });
  startOfWeekSel.addEventListener("change", () => {
    startDow = Number(startOfWeekSel.value);
    render();
  });
  btnClearAll.addEventListener("click", () => {
    if(confirm("모든 일정을 삭제할까요?")){
      events = [];
      saveEvents();
      render();
    }
  });

  // ---------- Modal interactions ----------
  modalClose.addEventListener("click", closeModal);
  modalCancel.addEventListener("click", closeModal);
  modalBackdrop.addEventListener("click", (e) => {
    if(e.target === modalBackdrop) closeModal();
  });
  modalSave.addEventListener("click", createEvent);
  document.addEventListener("keydown", (e) => {
    if(modalBackdrop.style.display === "flex" && e.key === "Escape") closeModal();
    if(modalBackdrop.style.display === "flex" && (e.ctrlKey || e.metaKey) && e.key === "Enter") createEvent();
  });

  // ---------- Init ----------
  buildTimeCol();
  render();
})();
</script>
</body>
</html>
